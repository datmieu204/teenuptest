services:
  db:
    image: postgres:16-alpine
    container_name: mini_lms_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lms_mini
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lms_mini"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: mini_lms_backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/lms_mini
      PORT: 4000
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: mini_lms_frontend
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-4000}/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
    ports:
      - "${FRONTEND_PORT:-5174}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
